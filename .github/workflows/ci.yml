name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/market
      
      # Format check enforces consistent code style across the project using rustfmt.
      # Configuration is defined in contracts/market/rustfmt.toml to ensure all
      # contributors format code identically. This prevents style drift and makes
      # code reviews focus on logic rather than formatting.
      - name: Format check
        run: cd contracts/market && cargo fmt --check
      
      # Clippy is Rust's official linter. The `-D warnings` flag promotes every
      # lint warning to a hard error so no warnings can accumulate silently.
      # To silence a specific lint where it is intentionally acceptable, add a
      # targeted `#[allow(lint_name)]` attribute in the source rather than
      # weakening this flag globally.
      - name: Clippy
        run: cd contracts/market && cargo clippy -- -D warnings
      
      - name: Tests
        run: cd contracts/market && cargo test
      
      - name: Build
        run: cd contracts/market && cargo build --target wasm32-unknown-unknown

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint web app
        run: pnpm --filter web lint

      - name: Build web app
        run: pnpm --filter web build