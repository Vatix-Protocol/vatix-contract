name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/market
      
      - name: Format check
        run: cd contracts/market && cargo fmt --check
      
      # Clippy is Rust's official linter. The `-D warnings` flag promotes every
      # lint warning to a hard error so no warnings can accumulate silently.
      # To silence a specific lint where it is intentionally acceptable, add a
      # targeted `#[allow(lint_name)]` attribute in the source rather than
      # weakening this flag globally.
      - name: Clippy
        run: cd contracts/market && cargo clippy -- -D warnings
      
      # Runs all unit and integration tests for the market contract via `cargo test`.
      # Tests are defined alongside the contract source under `contracts/market/src/`
      # using Soroban SDK test utilities. A new test should be added for every
      # public contract function to maintain coverage.
      - name: Tests
        run: cd contracts/market && cargo test
      
      # Compiles the market contract to WebAssembly targeting `wasm32-unknown-unknown`.
      # The resulting `.wasm` artefact is the deployable contract binary that gets
      # published to the Stellar network via `scripts/deploy.sh` or the Soroban CLI.
      - name: Build
        run: cd contracts/market && cargo build --target wasm32-unknown-unknown

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint web app
        run: pnpm --filter web lint

      - name: Build web app
        run: pnpm --filter web build